<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomass Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px 24px;
        }
        .hero-img {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 32px;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 32px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #2d8c2d;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover {
            background: #236b23;
        }
        .btn-outline {
            background: #fff;
            color: #2d8c2d;
            border: 2px solid #2d8c2d;
        }
        .btn-outline:hover {
            background: #2d8c2d;
            color: #fff;
        }
        .github-link {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            color: #999;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .github-link:hover {
            color: #333;
        }
        .github-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="peloncillo_landscape.png" alt="Drone landscape of Peloncillo Mountains" class="hero-img">
        <h1>Biomass Explorer</h1>
        <p>Peloncillo Mountains, New Mexico</p>
        <div class="btn-group">
            <a href="map.html" class="btn">Open Biomass Map</a>
            <a href="https://github.com/jeffgillan/biomass_pipeline" target="_blank" class="btn btn-outline">Biomass Pipeline Documentation</a>
            <a href="https://ps2.d2s.org/sharepotree?file_id=d93c3d38-e8da-4773-b5da-20737d7951e6" target="_blank" class="btn btn-outline">3D LiDAR Map</a>
            <a href="https://ps2.d2s.org/sharepotree?file_id=75759d11-fa6b-428c-a9a1-ededd89dbe91" target="_blank" class="btn btn-outline">3D Drone Map</a>
        </div>
    </div>
    <a href="https://github.com/jeffgillan/living_carbon_demo" target="_blank" class="github-link" aria-label="View source on GitHub">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        View on GitHub
    </a>
</body>
</html>
