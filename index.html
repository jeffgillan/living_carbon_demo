<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomass Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 24px;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #2d8c2d;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #236b23;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Biomass Explorer</h1>
        <p>Draw an area of interest or upload a GeoJSON polygon to calculate total biomass from remotely sensed data.</p>
        <a href="map.html" class="btn">Open Map</a>
    </div>
</body>
</html>
